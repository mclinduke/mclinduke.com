  <!-- PAGE HEADER -->
  <section class="gallery-header">
    <div class="container">
      <span class="section-label" data-animate>Photography</span>
      <h1 class="gallery-title" data-animate data-animate-delay="1">Ten Trails.<br><em>One Camera.</em></h1>
      <p class="gallery-subtitle" data-animate data-animate-delay="2">No studio, no stylist, no second take. Just what I saw out there.</p>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       TRAILS GALLERY
  ══════════════════════════════════════════ -->

  <!-- TRAIL FILTER TABS -->
  <div class="gallery-filters-wrap" id="trail-filters-wrap">
    <div class="gallery-filters container">
      <button class="filter-btn active" data-filter="all" data-gallery="trails">All Trails <span class="filter-count" id="count-all"></span></button>
      <button class="filter-btn" data-filter="pct" data-gallery="trails">PCT <span class="filter-count" id="count-pct"></span></button>
      <button class="filter-btn" data-filter="at" data-gallery="trails">AT <span class="filter-count" id="count-at"></span></button>
      <button class="filter-btn" data-filter="ebc" data-gallery="trails">Everest <span class="filter-count" id="count-ebc"></span></button>
      <button class="filter-btn" data-filter="tmb" data-gallery="trails">Mont Blanc <span class="filter-count" id="count-tmb"></span></button>
      <button class="filter-btn" data-filter="colorado" data-gallery="trails">Colorado <span class="filter-count" id="count-colorado"></span></button>
      <button class="filter-btn" data-filter="pinhoti" data-gallery="trails">Pinhoti <span class="filter-count" id="count-pinhoti"></span></button>
      <button class="filter-btn" data-filter="trt" data-gallery="trails">Tahoe <span class="filter-count" id="count-trt"></span></button>
      <button class="filter-btn" data-filter="uinta" data-gallery="trails">Uinta <span class="filter-count" id="count-uinta"></span></button>
      <button class="filter-btn" data-filter="lost-coast" data-gallery="trails">Lost Coast <span class="filter-count" id="count-lost-coast"></span></button>
      <button class="filter-btn" data-filter="bmt" data-gallery="trails">BMT <span class="filter-count" id="count-bmt"></span></button>
      <button class="filter-btn" data-filter="eagle-rock" data-gallery="trails">Eagle Rock <span class="filter-count" id="count-eagle-rock"></span></button>
      <button class="filter-btn" data-filter="escalante" data-gallery="trails">Escalante <span class="filter-count" id="count-escalante"></span></button>
      <button class="filter-btn" data-filter="whitney" data-gallery="trails">Whitney <span class="filter-count" id="count-whitney"></span></button>
      <button class="filter-btn" data-filter="shasta" data-gallery="trails">Shasta <span class="filter-count" id="count-shasta"></span></button>
    </div>
  </div>

  <!-- TRAILS GALLERY GRID -->
  <main class="gallery-main">
    <div class="container">
      <div class="masonry-grid" id="gallery-grid"></div>
      <div class="gallery-load-more">
        <button class="btn btn-outline btn-arrow" id="load-more-btn">Load More</button>
        <p class="gallery-showing" id="gallery-showing"></p>
      </div>
    </div>
  </main>

  <!-- LIGHTBOX (shared) -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Photo viewer">
    <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" id="lb-prev" aria-label="Previous photo">&#8592;</button>
    <button class="lightbox-next" id="lb-next" aria-label="Next photo">&#8594;</button>
    <div class="lightbox-content">
      <div class="lightbox-spinner" id="lb-spinner"></div>
      <img class="lightbox-img" id="lb-img" src="" alt="" loading="eager">
      <div class="lightbox-caption" id="lb-caption"></div>
    </div>
    <div class="lightbox-counter" id="lb-counter"></div>
  </div>
